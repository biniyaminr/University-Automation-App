<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assisted Auto-Fill</title>
    <style>
        body {
            width: 320px;
            margin: 0;
            padding: 20px;
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            border: 1px solid #262626;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #262626;
            padding-bottom: 12px;
        }

        .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background-color: #059669;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(6, 78, 59, 0.5);
        }

        .title {
            margin: 0;
            font-size: 1.125rem;
            font-weight: bold;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #34d399, #2dd4bf);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.875rem;
        }

        .label {
            color: #a3a3a3;
        }

        .status {
            color: #34d399;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #34d399;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        .btn {
            width: 100%;
            margin-top: 8px;
            padding: 12px 16px;
            border-radius: 6px;
            background-color: #059669;
            color: white;
            border: none;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(6, 78, 59, 0.4);
        }

        .btn:hover {
            background-color: #10b981;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="icon">A</div>
            <h1 class="title">Assisted Super Extension</h1>
        </div>

        <div class="status-row">
            <span class="label">Status:</span>
            <span id="statusIndicator" class="status">
                <span class="dot"></span>
                Connected
            </span>
        </div>

        <button id="fillBtn" class="btn">
            Auto-Fill This Page
        </button>
    </div>

    <script src="popup.js"></script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 320px;
      padding: 16px;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 16px;
      color: #38bdf8;
    }

    button#autofill-btn {
      width: 100%;
      padding: 10px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 16px;
      transition: 0.2s;
    }

    button#autofill-btn:hover {
      background: #059669;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #334155;
    }

    .data-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 2px;
    }

    .data-value {
      font-size: 14px;
      font-weight: 500;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
      max-width: 150px;
    }

    .copy-btn {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .copy-btn.copied {
      background: #10b981;
      color: white;
    }
  </style>
</head>

<body>
  <button id="autofill-btn">🚀 Auto-Fill This Page</button>
  <h3>Your Data Vault</h3>
  <div id="profileData">Loading data...</div>
  <script src="popup.js"></script>
</body>

</html>

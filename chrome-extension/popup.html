<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AssistedApp Auto-Filler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      width: 320px;
      height: auto;
      max-height: 500px;
      /* Allow popup to grow but cap it */
      overflow-y: auto;
      /* Enable scrolling for long profiles */
    }

    /* Sleek scrollbar for the popup */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: #262626;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #404040;
    }

    /* Animation for the copy button */
    .copy-success {
      background-color: #10b981 !important;
      /* Tailwind emarald-500 */
      color: white !important;
      border-color: #059669 !important;
    }
  </style>
</head>

<body class="bg-neutral-950 text-neutral-100 font-sans p-4 border border-neutral-800">
  <div class="flex flex-col gap-4">
    <!-- Header -->
    <div class="flex items-center gap-2 border-b border-neutral-800 pb-3">
      <div
        class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center font-bold text-white shadow-lg shadow-violet-900/50">
        A</div>
      <h1
        class="text-lg font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-violet-300 to-indigo-400">
        AssistedApp</h1>
    </div>

    <div class="space-y-2">
      <p class="text-sm text-neutral-400">Automatically map your Master Profile to application fields on the current
        page.</p>
    </div>

    <!-- Actions -->
    <div class="flex flex-col gap-2 mt-2">
      <button id="connectBtn"
        class="w-full py-2 px-4 rounded-md bg-neutral-800 hover:bg-neutral-700 text-sm font-medium transition-colors border border-neutral-700 font-bold">
        Connect to AssistedApp
      </button>

      <button id="fillBtn"
        class="w-full py-2 px-4 rounded-md bg-violet-600 hover:bg-violet-700 text-white text-sm font-bold transition-colors shadow-lg shadow-violet-900/30 hidden">
        Auto-Fill Page
      </button>
    </div>

    <div id="status" class="text-xs text-center text-neutral-500 mt-2 hidden">
      Status updates will appear here...
    </div>

    <!-- Click-to-Copy Fallback Data Container -->
    <div id="profileDataContainer" class="hidden flex-col gap-2 mt-2 pt-4 border-t border-neutral-800">
      <p class="text-xs font-semibold text-neutral-500 mb-1 uppercase tracking-wider">Manual Fallback</p>
      <div id="profileData" class="flex flex-col gap-2">
        <!-- JS will inject rows here -->
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>

</html>
